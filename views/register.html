<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Felinoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/auth.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <a href="/" class="logo" style="text-decoration: none;">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <span>Felinoo</span>
        </a>
        
        <h2>Únete a la familia 🐱</h2>
        
        <form id="registerForm" action="/register" method="post">
            <div class="form-group">
                <label for="fullname">Nombre completo</label>
                <input type="text" oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ ]/g, '');" id="fullname" name="fullname" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Teléfono de contacto</label>
                <input type="number" maxlength="15" oninput="if(this.value.length > 15) this.value = this.value.slice(0, 15);" id="phone" name="phone" placeholder="Ej. +56 9 1234 5678" required>
            </div>

            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" placeholder="Elige un nombre de usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Crea una contraseña segura" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Registrarse</button>
        </form>
        
        <div class="auth-links">
            <a href="/login">¿Ya tienes cuenta? Inicia sesión</a>
            <a href="/" style="color: var(--text-light); font-weight: normal; margin-top: 5px;">Volver al inicio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/main.js"></script>
</body>
</html>
