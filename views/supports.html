<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donaciones - Admin Felinoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/admin_tabs.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <a href="/admin" style="text-decoration:none; color:inherit;"><span>Felinoo Admin</span></a>
        </div>
        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <a href="/admin">Volver al Panel</a>
        </nav>
    </header>

    <section class="admin-section">
        <h2>Donaciones Recibidas</h2>
        <div class="table-container">
            <table id="donationsTable" >
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Donante</th>
                        <th>Cantidad</th>
                        <th>Método de Pago</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Se llenará con JS -->
                </tbody>
            </table>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function loadDonations() {
            try {
                const response = await fetch('/api/donations');
                const data = await response.json();
                console.log("Donaciones recibidas:", data);
                const tbody = document.querySelector('#donationsTable tbody');
                tbody.innerHTML = '';
                
                if (data.donaciones && data.donaciones.length > 0) {
                    data.donaciones.forEach(d => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${d.id}</td>
                            <td>${d.user_name || d.id_user}</td>
                            <td>$${d.amount}</td>
                            <td>${d.payment_method || '-'}</td>
                            <td>${d.created_at ? new Date(d.created_at).toLocaleDateString() : '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay donaciones registradas</td></tr>';
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudieron cargar las donaciones', 'error');
            }
        }
        
        loadDonations();
    </script>
    <script src="/js/main.js"></script>
</body>
</html>
