<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/Logo.png" type="image/png">
    <title>Adopta un Gatito</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/home.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <span>Felinoo</span>
        </div>
        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <div class="user-menu" id="userMenu" >
                <button class="btn btn-outline" id="userDropdownBtn" style="display: flex; align-items: center; gap: 8px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" width="18" height="18" alt="user" style="opacity: 0.7;">
                    <span id="navUsername">Usuario</span>
                </button>
                <div class="dropdown-content" id="userDropdownContent">
                    <a href="#" id="logoutBtn">Cerrar Sesión</a>
                </div>
            </div>
        </nav>
    </header>

    <section id="hero" class="hero">
        <div class="hero-content">
            <h1>Panel de Administración</h1>
            <p>Administra los gatitos y las solicitudes de adopción.</p>
            <div class="hero-actions">
                <a href="/requests" class="btn btn-primary btn-large">Ver Solicitudes</a>
                <a href="/register_cat" class="btn btn-secondary btn-large">Registrar Gatito</a>
                <a href="/supports" class="btn btn-secondary btn-large">Ver Donaciones</a>
            </div>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Gatito lindo">
        </div>
    </section>



    <footer>
        <p>&copy; 2026 Felinoo. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/main.js"></script>
</body>
</html>
