<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoptar - Felinoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/adopt.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <span>Felinoo</span>
        </div>
        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <a href="/">Inicio</a>
            <a href="/adopt" class="active-nav">Adoptar</a>
            <a href="/rehome">Dar en adopción</a>
            <a href="/support">Apoyar a la causa</a>
            <div class="auth-buttons">
                <a href="/login" class="btn btn-outline">Iniciar Sesión</a>
                <a href="/register" class="btn btn-primary">Registrarse</a>
            </div>
            <div class="user-menu" id="userMenu" style="display: none;">
                <button class="btn btn-outline" id="userDropdownBtn" style="display: flex; align-items: center; gap: 8px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" width="18" height="18" alt="user" style="opacity: 0.7;">
                    <span id="navUsername">Usuario</span>
                </button>
                <div class="dropdown-content" id="userDropdownContent">
                    <a href="#" id="logoutBtn">Cerrar Sesión</a>
                </div>
            </div>
        </nav>
    </header>

    <section id="adopt" class="adopt-section">
        <div class="section-header">
            <h2>Gatitos esperando un hogar</h2>
            <p>Conoce a estos adorables michis. Cada uno tiene una personalidad única y mucho amor para dar.</p>
        </div>
        
        <div class="cats-grid" id="catsGrid">
            <!-- Gatitos dinámicos cargados desde el servidor -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Felinoo. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/main.js"></script>
</body>
</html>
