<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/Logo.png" type="image/png">
    <title>Iniciar Sesión - Felinoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/auth.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <a href="/" class="logo" style="text-decoration: none;">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <span>Felinoo</span>
        </a>
        
        <h2>¡Hola de nuevo! 🐾</h2>
        
        <form id="loginForm" action="/login" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Iniciar Sesión</button>
        </form>
        
        <div class="auth-links">
            <a href="/register">¿No tienes cuenta? Regístrate aquí</a>
            <a href="/" style="color: var(--text-light); font-weight: normal; margin-top: 5px;">Volver al inicio</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/main.js"></script>
</body>
</html>
