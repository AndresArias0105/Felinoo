<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Admin Felinoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/style.css">
    <style>
        .admin-section { padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ddd; border-radius: 8px 8px 0 0; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 16px; }
        .tab-btn.active { background: #AED4BD; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 0 8px 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        .status-pending { color: orange; font-weight: bold; }
        .status-accepted { color: green; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
        .action-btns { display: flex; gap: 5px; }
        .action-btns button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Nunito', sans-serif; }
        .btn-accept { background: #AED4BD; color: white; }
        .btn-reject { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <a href="/admin" style="text-decoration:none; color:inherit;"><span>Felinoo Admin</span></a>
        </div>
        <nav>
            <a href="/admin">Volver al Panel</a>
        </nav>
    </header>

    <section class="admin-section">
        <h2>Gestión de Solicitudes</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('adoptions')">Adopciones</button>
            <button class="tab-btn" onclick="switchTab('rehomes')">Rehomes</button>
        </div>

        <div id="adoptions-tab" class="tab-content active">
            <h3>Solicitudes de Adopción</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ID Usuario</th>
                        <th>ID Gatito</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="adoptions-tbody">
                    <!-- JS fills this -->
                </tbody>
            </table>
        </div>

        <div id="rehomes-tab" class="tab-content">
            <h3>Solicitudes de Rehome</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ID Usuario</th>
                        <th>Gatito Info</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="rehomes-tbody">
                    <!-- JS fills this -->
                </tbody>
            </table>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
            
            if (tab === 'adoptions') loadAdoptions();
            if (tab === 'rehomes') loadRehomes();
        }

        async function loadAdoptions() {
            try {
                const res = await fetch('/api/adoptions');
                const data = await res.json();
                const tbody = document.getElementById('adoptions-tbody');
                tbody.innerHTML = '';
                
                if (data.adopciones && data.adopciones.length > 0) {
                    data.adopciones.forEach(req => {
                        const estado = req.estado || 'pendiente';
                        const statusClass = `status-${estado}`;
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${req.id_request}</td>
                            <td>${req.id_user}</td>
                            <td>${req.id_cat}</td>
                            <td class="${statusClass}">${estado.toUpperCase()}</td>
                            <td class="action-btns">
                                ${(estado === 'pendiente') ? `
                                    <button class="btn-accept" onclick="handleAction('adoptions', ${req.id_request}, 'aceptar')">Aceptar</button>
                                    <button class="btn-reject" onclick="handleAction('adoptions', ${req.id_request}, 'rechazar')">Rechazar</button>
                                ` : '-'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay solicitudes de adopción</td></tr>';
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudieron cargar las adopciones', 'error');
            }
        }

        async function loadRehomes() {
            try {
                const res = await fetch('/api/rehomes');
                const data = await res.json();
                const tbody = document.getElementById('rehomes-tbody');
                tbody.innerHTML = '';
                
                if (data.rehomes && data.rehomes.length > 0) {
                    data.rehomes.forEach(req => {
                        const estado = req.estado || 'pendiente';
                        const statusClass = `status-${estado}`;
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${req.id_request}</td>
                            <td>${req.id_user}</td>
                            <td>${req.cat_name || 'N/A'} (${req.cat_age || '?'} meses)</td>
                            <td class="${statusClass}">${estado.toUpperCase()}</td>
                            <td class="action-btns">
                                ${(estado === 'pendiente') ? `
                                    <button class="btn-accept" onclick="handleAction('rehomes', ${req.id_request}, 'aceptar')">Aceptar</button>
                                    <button class="btn-reject" onclick="handleAction('rehomes', ${req.id_request}, 'rechazar')">Rechazar</button>
                                ` : '-'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay solicitudes de rehome</td></tr>';
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudieron cargar los rehomes', 'error');
            }
        }

        async function handleAction(type, id, action) {
            try {
                const res = await fetch(`/api/${type}/${action}/${id}`, { method: 'POST' });
                if (res.ok) {
                    Swal.fire('Éxito', `Solicitud ${action}da correctamente`, 'success');
                    if (type === 'adoptions') loadAdoptions();
                    if (type === 'rehomes') loadRehomes();
                } else {
                    const data = await res.json();
                    Swal.fire('Error', data.message || 'Error al procesar la solicitud', 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudo conectar con el servidor', 'error');
            }
        }

        // Cargar por defecto la primera pestaña
        loadAdoptions();
    </script>
</body>
</html>
