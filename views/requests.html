<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/Logo.png" type="image/png">
    <title>Solicitudes - Admin Felinoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/admin_tabs.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/img/Logo.png" alt="Logo Felinoo">
            <a href="/admin" style="text-decoration:none; color:inherit;"><span>Felinoo Admin</span></a>
        </div>
        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <a href="/admin">Volver al Panel</a>
        </nav>
    </header>

    <section class="admin-section">
        <h2>Gestión de Solicitudes</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('adoptions', this)">Adopciones</button>
            <button class="tab-btn" onclick="switchTab('rehomes', this)">Rehomes</button>
        </div>

        <div id="adoptions-tab" class="tab-content active">
            <h3>Solicitudes de Adopción</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Gatito</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="adoptions-tbody">
                    <!-- JS fills this -->
                </tbody>
            </table>
        </div>

        <div id="rehomes-tab" class="tab-content">
            <h3>Solicitudes de Rehome</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Gatito Info</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="rehomes-tbody">
                    <!-- JS fills this -->
                </tbody>
            </table>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        window.switchTab = function(tab, btn) {
            if (!btn) return;
            const tabContent = document.getElementById(`${tab}-tab`);
            if (!tabContent) return;

            // Remover activo de todos los botones y contenidos
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            // Activar el seleccionado
            btn.classList.add('active');
            tabContent.classList.add('active');
            
            if (tab === 'adoptions') loadAdoptions();
            if (tab === 'rehomes') loadRehomes();
        }

        function getStatusInfo(estado) {
            const map = {
                'pendiente': { class: 'status-pending', text: 'PENDIENTE' },
                'aprobada': { class: 'status-accepted', text: 'APROBADA' },
                'rechazada': { class: 'status-rejected', text: 'RECHAZADA' }
            };
            return map[estado] || { class: '', text: estado.toUpperCase() };
        }

        async function loadAdoptions() {
            try {
                const res = await fetch('/api/adoptions');
                const data = await res.json();
                const tbody = document.getElementById('adoptions-tbody');
                tbody.innerHTML = '';
                
                if (data.adopciones && data.adopciones.length > 0) {
                    data.adopciones.forEach(req => {
                        const info = getStatusInfo(req.estado || 'pendiente');
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#${req.id_request}</td>
                            <td>${req.user_name || 'ID: ' + req.id_user}</td>
                            <td>${req.cat_name || 'ID: ' + req.id_cat}</td>
                            <td><span class="${info.class}">${info.text}</span></td>
                            <td class="action-btns">
                                ${(req.estado === 'pendiente') ? `
                                    <button class="btn-accept" onclick="handleAction('adoptions', ${req.id_request}, 'aceptar')">Aceptar</button>
                                    <button class="btn-reject" onclick="handleAction('adoptions', ${req.id_request}, 'rechazar')">Rechazar</button>
                                ` : '-'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay solicitudes de adopción</td></tr>';
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudieron cargar las adopciones', 'error');
            }
        }

        async function loadRehomes() {
            try {
                const res = await fetch('/api/rehomes');
                const data = await res.json();
                const tbody = document.getElementById('rehomes-tbody');
                tbody.innerHTML = '';
                
                if (data.rehomes && data.rehomes.length > 0) {
                    data.rehomes.forEach(req => {
                        const info = getStatusInfo(req.estado || 'pendiente');
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#${req.id_request}</td>
                            <td>${req.user_name || 'ID: ' + req.id_user}</td>
                            <td>
                                <strong>${req.cat_name}</strong> (${req.cat_age})<br>
                                <small>${req.cat_description.substring(0, 50)}...</small>
                            </td>
                            <td><span class="${info.class}">${info.text}</span></td>
                            <td class="action-btns">
                                ${(req.estado === 'pendiente') ? `
                                    <button class="btn-accept" onclick="handleAction('rehomes', ${req.id_request}, 'aceptar')">Aceptar</button>
                                    <button class="btn-reject" onclick="handleAction('rehomes', ${req.id_request}, 'rechazar')">Rechazar</button>
                                ` : '-'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay solicitudes de rehome</td></tr>';
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudieron cargar los rehomes', 'error');
            }
        }

        async function handleAction(type, id, action) {
            const confirm = await Swal.fire({
                title: '¿Estás seguro?',
                text: `Vas a ${action} esta solicitud`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#AED4BD',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Sí, continuar',
                cancelButtonText: 'Cancelar'
            });

            if (!confirm.isConfirmed) return;

            try {
                const res = await fetch(`/api/${type}/${action}/${id}`, { method: 'POST' });
                if (res.ok) {
                    Swal.fire('¡Hecho!', `La solicitud ha sido ${action}da.`, 'success');
                    if (type === 'adoptions') loadAdoptions();
                    if (type === 'rehomes') loadRehomes();
                } else {
                    const error = await res.json();
                    Swal.fire('Error', error.message || 'No se pudo procesar la acción', 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Ocurrió un error en la conexión', 'error');
            }
        }

        // Cargar por defecto
        loadAdoptions();
    </script>
    <script src="/js/main.js"></script>
</body>
</html>
